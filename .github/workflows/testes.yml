name: Testes

# Roda os testes a cada push e em pull requests.
# Cobertura:
#  - lógica financeira do orçamento (totais, descontos, parcelas);
#  - integração do serviço de clientes (autocompletar por CNPJ: casos de borda,
#    normalização de máscara, autofill determinístico e consulta pública).
on:
  push:
  pull_request:

jobs:
  testes:
    name: Testes unitários (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci dispara o postinstall (prisma generate), que roda offline
      # e é necessário para o TypeScript compilar os imports do serviço.
      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes
        run: npm test
