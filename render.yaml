# ===== Render Blueprint — Best Medical Backend =====
# Cria um Web Service (NestJS) + um banco PostgreSQL gerenciado.
# Importe este arquivo no Render (New > Blueprint) apontando para o repositório.

services:
  - type: web
    name: bestmedical-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bestmedical-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: "https://bestmedical.pplx.app,http://localhost:5173"
      - key: SEED_ADMIN_EMAIL
        value: admin@bestmedical.com.br
      - key: SEED_ADMIN_PASSWORD
        value: admin123
      - key: SEED_ADMIN_NOME
        value: Administrador

databases:
  - name: bestmedical-db
    plan: free
