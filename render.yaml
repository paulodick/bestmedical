# ===== Render Blueprint — Best Medical Backend =====
# Cria um Web Service (NestJS) + um banco PostgreSQL gerenciado.
# Importe este arquivo no Render (New > Blueprint) apontando para o repositório.

services:
  - type: web
    name: bestmedical-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build && npx prisma migrate deploy && npm run prisma:seed
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bestmedical-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: "https://bestmedical.onrender.com,https://bestmedical.pplx.app,http://localhost:5173"
      - key: SEED_ADMIN_EMAIL
        value: admin@bestmedical.com.br
      - key: SEED_ADMIN_PASSWORD
        value: admin123
      - key: SEED_ADMIN_NOME
        value: Administrador
      # Senha do admin master 'paulodick'. Definida como secreta no painel do
      # Render (nunca fica no código). Deixe em branco após o primeiro deploy
      # se quiser que a senha alterada pelo usuário seja preservada.
      - key: SEED_PAULO_PASSWORD
        sync: false
      # ===== E-mail — preencha no painel do Render =====
      # Preferencial: API HTTP do Brevo (contorna o bloqueio de portas
      # SMTP de saida no plano free do Render). Se BREVO_API_KEY estiver
      # definido, o envio usa o Brevo; caso contrario, usa o SMTP abaixo.
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: chamados@bestmedical.com.br
      - key: MAIL_FROM_NAME
        value: Best Medical
      - key: MAIL_CC
        value: chamados@bestmedical.com.br

databases:
  - name: bestmedical-db
    plan: free
