# ===== Render Blueprint — Best Medical Backend =====
# Cria um Web Service (NestJS) + um banco PostgreSQL gerenciado.
# Importe este arquivo no Render (New > Blueprint) apontando para o repositório.

services:
  - type: web
    name: bestmedical-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma migrate deploy && npm run prisma:seed
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bestmedical-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: "https://bestmedical.pplx.app,http://localhost:5173"
      - key: SEED_ADMIN_EMAIL
        value: admin@bestmedical.com.br
      - key: SEED_ADMIN_PASSWORD
        value: admin123
      - key: SEED_ADMIN_NOME
        value: Administrador
      # ===== E-mail (SMTP) — preencha no painel do Render =====
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: chamados@bestmedical.com.br
      - key: MAIL_FROM_NAME
        value: Best Medical
      - key: MAIL_CC
        value: chamados@bestmedical.com.br

databases:
  - name: bestmedical-db
    plan: free
